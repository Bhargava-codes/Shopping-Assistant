<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>Reviews | Shopping Agent Lab</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <a class="brand" href="/" aria-label="Shopping Agent Lab home">
          <span class="brand-mark" aria-hidden="true">C</span>
          <span>Cartwise</span>
        </a>
        <nav class="topnav" aria-label="Workspace">
          <a href="/">Agent Lab</a>
          <a href="/reviews" aria-current="page">Reviews</a>
        </nav>
        <div class="topbar-meta">
          <span class="status-dot ready" aria-hidden="true"></span>
          <span id="review-status">Loading reviews...</span>
        </div>
      </header>

      <section class="workspace reviews-workspace" aria-labelledby="page-title">
        <div class="page-heading reviews-heading">
          <div>
            <h1 id="page-title">Product Reviews</h1>
          </div>
          <label class="review-search">
            <span>Search products</span>
            <input id="review-search" type="search" placeholder="Mouse, webcam, monitor..." />
          </label>
        </div>

        <div class="category-strip" id="category-strip" aria-label="Product categories"></div>

        <div class="reviews-grid">
          <aside class="panel product-list-panel" aria-labelledby="product-list-title">
            <div class="panel-heading">
              <div>
                <span class="section-number">01</span>
                <h2 id="product-list-title">Products</h2>
              </div>
              <span class="trace-count" id="product-count">0 products</span>
            </div>
            <div class="product-list" id="product-list"></div>
          </aside>

          <section class="panel product-detail-panel" aria-labelledby="product-detail-title">
            <div class="panel-heading">
              <div>
                <span class="section-number">02</span>
                <h2 id="product-detail-title">Review Evidence</h2>
              </div>
              <span class="trace-count" id="review-count">0 reviews</span>
            </div>
            <div class="product-detail" id="product-detail">
              <div class="trace-empty">Select a product to inspect review evidence.</div>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="/reviews.js"></script>
  </body>
</html>
